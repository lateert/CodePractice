
spring:
  main:
    allow-circular-references: true
  application:
    name: code-practice-backend
  # Сопоставление путей MVC
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # Spring Session в Redis
  session:
    store-type: redis
    # TTL сессии (30 суток)
    timeout: 2592000
    redis:
      namespace: code-practice:spring:session
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/code_practice}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  # Redis для локальной разработки
  redis:
    database: 1
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    timeout: 5000
    password: ${REDIS_PASSWORD:}

  servlet:
    multipart:
      # Максимальный размер файла
      max-file-size: 10MB
server:
  address: 0.0.0.0
  port: 8121
  servlet:
    context-path: /api
    # max-age cookie сессии
    session:
      cookie:
        max-age: 2592000
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0
app:
  file:
    # При MinIO (docker-compose в корне репозитория) загрузки идут в S3; локальная папка не используется.
    local-storage-enabled: false
    local-storage-root: ${LOCAL_UPLOAD_ROOT:${user.home}/.code-practice/local-uploads}
  s3:
    enabled: true
    endpoint: ${S3_ENDPOINT:http://127.0.0.1:9000}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:code-practice}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    path-style-access: true
    # Публичные URL объектов (бакет code-practice; для dev init выставляет anonymous download)
    public-base-url: ${S3_PUBLIC_BASE_URL:http://127.0.0.1:9000/code-practice}

# Удалённая песочница
codesandbox:
  type: remote