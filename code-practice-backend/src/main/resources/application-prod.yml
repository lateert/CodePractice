# Продакшен-профиль (секреты задавать через env / внешний конфиг).
spring:
  main:
    allow-circular-references: true
  application:
    name: code-practice-backend
  # Сопоставление путей MVC
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # Spring Session в Redis
  session:
    store-type: redis
    # TTL сессии (30 суток)
    timeout: 2592000
    redis:
      namespace: code-practice:spring:session
  # JDBC (в проде переопределить DB_*)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/code_practice}
    username: ${DB_USERNAME:code_practice}
    password: ${DB_PASSWORD:change_me}
  # Подключение к Redis
  redis:
    database: 1
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: 5000
    password: ${REDIS_PASSWORD:}
  # Elasticsearch (опционально)
  #  elasticsearch:
  #    uris: http://43.143.20.63:9200
  #    username: root
  #    password: 123456
  # Лимиты multipart
  servlet:
    multipart:
      # Максимальный размер файла
      max-file-size: 10MB
server:
  address: 0.0.0.0
  port: 18121
  servlet:
    context-path: /api
    # max-age cookie сессии
    session:
      cookie:
        max-age: 2592000
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # поле логического удаления
      logic-delete-value: 1
      logic-not-delete-value: 0
app:
  file:
    local-storage-enabled: false
  s3:
    enabled: ${S3_ENABLED:false}
    endpoint: ${S3_ENDPOINT:}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
    path-style-access: ${S3_PATH_STYLE:false}
    public-base-url: ${S3_PUBLIC_BASE_URL:}

# Удалённая песочница
codesandbox:
  type : remote