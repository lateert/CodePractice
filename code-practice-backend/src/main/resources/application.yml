# Общие настройки Spring Boot.
spring:
  main:
    allow-circular-references: true
  application:
    name: code-practice-backend
  # Активный профиль
  profiles:
    active: local
  # Сопоставление путей MVC
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # Spring Session в Redis
  session:
    store-type: redis
    # TTL сессии (30 суток)
    timeout: 2592000
    redis:
      namespace: code-practice:spring:session
  # Источник JDBC
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/code_practice}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  # Подключение к Redis
  redis:
    database: 1
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: 5000
    password: ${REDIS_PASSWORD:}
  # Elasticsearch (опционально, по умолчанию выключен)
#  elasticsearch:
#    uris: http://43.143.20.63:9200
#    username: root
#    password: 123456
  # Лимиты multipart-загрузки
  servlet:
    multipart:
      # Максимальный размер одного файла
      max-file-size: 10MB
server:
  address: 0.0.0.0
  port: 8121
  servlet:
    context-path: /api
    # max-age cookie сессии (30 суток)
    session:
      cookie:
        max-age: 2592000
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # поле логического удаления в сущностях
      logic-delete-value: 1 # значение «удалено»
      logic-not-delete-value: 0 # значение «не удалено»
# Удалённая песочница кода (сервис code-practice-sandbox)
codesandbox:
  type : remote

app:
  file:
    local-storage-enabled: false
    local-storage-root: ${LOCAL_UPLOAD_ROOT:${user.home}/.code-practice/local-uploads}
  s3:
    enabled: false
    endpoint: ${S3_ENDPOINT:}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
    path-style-access: ${S3_PATH_STYLE:false}
    public-base-url: ${S3_PUBLIC_BASE_URL:}

auth:
  jwt:
    issuer: code-practice-backend
    secret: ${JWT_SECRET:change_this_to_a_long_random_secret_at_least_32_chars}
    access-token-minutes: 30
    refresh-token-days: 14
    access-cookie-name: cp_access_token
    refresh-cookie-name: cp_refresh_token

integration:
  github:
    oauth:
      client-id: ${GITHUB_CLIENT_ID:}
      client-secret: ${GITHUB_CLIENT_SECRET:}
      redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8080/user/oauth/github/callback}

# Knife4j: язык интерфейса документации — только EN (имя enum в конфиге).
knife4j:
  enable: true
  setting:
    language: EN