# Профиль тестов (интеграционные тесты / CI)
server:
  port: 8101
spring:
  # JDBC (при необходимости Testcontainers подменяет настройки в рантайме)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/my_db
    username: root
    password: 123456
  # Redis (встроенный или тестовый инстанс)
  redis:
    database: 1
    host: localhost
    port: 6379
    timeout: 5000
    password: 123456
  # Elasticsearch (опционально для тестов)
  elasticsearch:
    uris: http://localhost:9200
    username: root
    password: 123456