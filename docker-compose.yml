services:
  minio:
    image: minio/minio:latest
    container_name: code-practice-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./.minio/data:/data

  minio-init:
    image: minio/mc:latest
    container_name: code-practice-minio-init
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        for i in $$(seq 1 30); do
          mc alias set local http://minio:9000 minioadmin minioadmin && break
          sleep 2
        done
        mc mb --ignore-existing local/code-practice
        mc anonymous set download local/code-practice
